{{ define "main" }}
    <main class="container mx-auto px-4 py-10">
        <h1 class="text-4xl font-bold text-center mb-10 text-gray-900 dark:text-gray-100">Projects</h1>
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            {{ range .Pages }}
                <div class="bg-white dark:bg-gray-800 shadow-lg rounded-lg overflow-hidden transition-transform transform hover:scale-105 hover:shadow-2xl">
                    <div class="p-6">
                        <h2 class="text-2xl font-semibold mb-3 text-gray-900 dark:text-gray-100">{{ .Title }}</h2>
                        <p class="text-gray-700 dark:text-gray-300 mb-4">{{ .Summary }}</p>
                        {{ if .Params.source }}
                            <a href="{{ .Params.source }}" target="_blank" class="inline-block bg-blue-500 text-white py-2 px-4 rounded-lg hover:bg-blue-600 transition-colors">View Source Code</a>
                        {{ end }}
                    </div>
                </div>
            {{ end }}
        </div>
    </main>
{{ end }}
